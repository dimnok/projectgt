
[functions.process_telegram_outbox]
enabled = true
verify_jwt = false
entrypoint = "./functions/process_telegram_outbox/index.ts"

[functions.auth-send-sms]
enabled = true
verify_jwt = false
import_map = "./functions/auth-send-sms/deno.json"
entrypoint = "./functions/auth-send-sms/index.ts"

[functions.otp-notisend]
enabled = true
verify_jwt = true
import_map = "./functions/otp-notisend/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/otp-notisend/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/otp-notisend/*.html" ]

[functions.export-ks2-form-header]
enabled = true
verify_jwt = true
entrypoint = "./functions/export-ks2-form-header/index.ts"
