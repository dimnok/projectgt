# Flutter Web собирается только здесь (runner с Flutter SDK).
# В панели Timeweb для сайта не указывайте команду сборки flutter —
# там обычно Node.js без Flutter → "flutter: not found".
# Хостинг: статика из bucket (содержимое build/web после s3 sync).

name: Deploy Flutter Web to Timeweb S3

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Один активный деплой за раз; новый push отменит устаревший прогон.
concurrency:
  group: deploy-timeweb-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TW_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TW_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: ru-1
      TW_S3_ENDPOINT: ${{ secrets.TW_S3_ENDPOINT }}
      TW_S3_BUCKET: ${{ secrets.TW_S3_BUCKET }}
      TW_S3_PATH_PREFIX: ${{ secrets.TW_S3_PATH_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Flutter Web (release)
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${SUPABASE_URL} \
            --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}

      - name: Upload build/web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web
          retention-days: 14

      - name: Install AWS CLI via pip
        run: |
          python3 -m pip install --upgrade --user pip awscli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy to Timeweb S3
        run: |
          DEST="s3://${TW_S3_BUCKET}${TW_S3_PATH_PREFIX:+/${TW_S3_PATH_PREFIX}}"
          echo "Sync build/web -> ${DEST}"
          aws s3 sync build/web "$DEST" --delete --endpoint-url "$TW_S3_ENDPOINT"

      - name: Summary
        run: |
          echo "Deployed to bucket: ${TW_S3_BUCKET}${TW_S3_PATH_PREFIX:+/${TW_S3_PATH_PREFIX}}" >> $GITHUB_STEP_SUMMARY
          echo "Endpoint: ${TW_S3_ENDPOINT}" >> $GITHUB_STEP_SUMMARY

