name: Build Windows App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows Support and Create Project
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows .

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Release
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: flutter build windows --release --dart-define=SUPABASE_URL=$Env:SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$Env:SUPABASE_ANON_KEY

      - name: Create Installer Script
        run: |
          $Version = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($Version)) { $Version = "1.0.0" }
          $Version = $Version.TrimStart("v")
          
          $Script = @"
          [Setup]
          AppName=ProjectGT
          AppVersion=$Version
          DefaultDirName={autopf}\ProjectGT
          DefaultGroupName=ProjectGT
          OutputDir=build\installer
          OutputBaseFilename=ProjectGT_Setup
          Compression=lzma2
          SolidCompression=yes
          PrivilegesRequired=lowest
          
          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{group}\ProjectGT"; Filename: "{app}\projectgt.exe"
          Name: "{autodesktop}\ProjectGT"; Filename: "{app}\projectgt.exe"; Tasks: desktopicon
          
          [Tasks]
          Name: "desktopicon"; Description: "Создать значок на Рабочем столе"; GroupDescription: "Дополнительные значки:"
          "@
          
          Set-Content -Path "installer.iss" -Value $Script -Encoding UTF8

      - name: Compile Installer (Inno Setup)
        run: iscc installer.iss

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/installer/ProjectGT_Setup.exe
