<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Система управления проектами и сметами">
  <meta name="keywords" content="project management, estimates, construction">

  <meta name="version" content="1.0.25">
  <meta name="build-number" content="50">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- iOS PWA: без theme-color (прозрачный status bar). Android — из boot-скрипта / Flutter. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Стройка PRO">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Стройка PRO">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>Стройка PRO</title>

  <!-- iOS PWA: прозрачный документ под black-translucent; цвет — только Flutter. -->
  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var isIos = /iPhone|iPad|iPod/i.test(ua);
      var isIosStandalone =
        isIos &&
        ((window.navigator.standalone === true) ||
          window.matchMedia('(display-mode: standalone)').matches);

      function applyIosPwaTransparentShell() {
        document.documentElement.setAttribute('data-ios-pwa', 'true');
        document.documentElement.style.backgroundColor = 'transparent';
        if (document.body) {
          document.body.style.backgroundColor = 'transparent';
        }
        document.querySelectorAll('meta[name="theme-color"]').forEach(function (m) {
          m.parentNode.removeChild(m);
        });
      }

      function applyAndroidShellColor() {
        var darkMq = window.matchMedia('(prefers-color-scheme: dark)');
        var color = darkMq.matches ? '#0E0E10' : '#FFFFFF';
        document.documentElement.style.setProperty('--app-surface-color', color);
        document.documentElement.style.backgroundColor = color;
        if (document.body) {
          document.body.style.backgroundColor = color;
        }
        var metas = document.querySelectorAll('meta[name="theme-color"]');
        if (metas.length === 0) {
          var meta = document.createElement('meta');
          meta.setAttribute('name', 'theme-color');
          meta.setAttribute('content', color);
          document.head.appendChild(meta);
        } else {
          metas.forEach(function (meta) {
            meta.setAttribute('content', color);
          });
        }
      }

      if (isIosStandalone) {
        applyIosPwaTransparentShell();
      } else {
        applyAndroidShellColor();
        var darkMq = window.matchMedia('(prefers-color-scheme: dark)');
        if (typeof darkMq.addEventListener === 'function') {
          darkMq.addEventListener('change', applyAndroidShellColor);
        } else if (typeof darkMq.addListener === 'function') {
          darkMq.addListener(applyAndroidShellColor);
        }
      }
    })();
  </script>

  <script>
    window.addEventListener('load', function () {
      if ('serviceWorker' in navigator) {
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
    });
  </script>

  <style id="splash-screen-style">
    html, body {
      margin: 0;
      min-height: 100%;
      background-color: var(--app-surface-color, #0E0E10);
      background-size: 100% 100%;
    }

    html[data-ios-pwa="true"],
    html[data-ios-pwa="true"] body {
      background-color: transparent !important;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .stretch {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cover {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
    }
  </script>
</head>
<body>
  <div id="gt-safe-area-probe" aria-hidden="true" style="position:fixed;top:0;left:0;width:0;height:0;margin:0;border:0;pointer-events:none;visibility:hidden;padding-top:env(safe-area-inset-top,0px);"></div>
  <picture id="splash">
    <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
    <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
    <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>

  <script src="flutter_bootstrap.js" async=""></script>
</body>
</html>
